<!DOCTYPE html>
<html lang="es">
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta charset="UTF-8">
	<title>Suma de numeros</title>
</head>
<body>
<script>
	function parImpar(num){
		/*he puesto triple igual para que el resultado de la división lo verifique pensando que sea exactamente igual a 0*/
		if(num%2===0){
			return "par";
		}else{
			return "impar";
		}
	}
	function diceImpar(){
		let numero=parseInt(prompt("Dime un numero"));
		let resultado=parImpar(numero);
		alert("El numero "+numero+" es "+resultado);
	}
	function sumaNumeros(){
		let numero1=parseInt(prompt("Dime un numero"));
		let numero2=parseInt(prompt("Dime otro numero"));
		let resultado=numero1+numero2;
		alert("La suma de "+numero1+" y "+numero2+" es "+resultado);
	}
</script>
	<button onclick="sumaNumeros()">Suma Números</button>
	<button onclick="diceImpar()">Par o impar</button>
</body>
</html>
