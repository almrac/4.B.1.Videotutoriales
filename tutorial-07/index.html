<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>JavaScript y el DOM 2ª Parte</title>
	<style>
		.importante{
			background-color: red;
			color: yellow;
			font-size: 30px;
		}
	</style>
	<script type="text/javascript">
		var nombre = prompt("Dime tu nombre");
		document.write("<h1>Hola" + " " + nombre + "</h1>");

		var edad = prompt("Dime tu edad");
		if (edad < 18) {
			document.write("<h1>Acceso no autorizado</h1>");
		} else {
			document.write("<h1>Bienvenido a mi página</h1>");
		}

		function aplicarClase(){
			document.getElementById("titlo").className = "importante";
		}
	</script>
</head>
<body>
	<h1 id="titlo">Título inical</h1>
	<button onclick="aplicarClase()">Aplicar clase</button>
</body>
</html>
