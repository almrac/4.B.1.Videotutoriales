<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Onblur</title>
	<script>
		function poneMayusculas() {
			var nombre=document.getElementById("nombre");
			var nombreMay=nombre.value.toLocaleUpperCase();
			nombre.value=nombreMay;
		}
	</script>
</head>
<body>
	<form action="procesa.php">
		<label for="nombre">Nombre: </label> <input type="text" id="nombre" name="nombre" onblur="poneMayusculas()"><br>
		<label for="apellidos">Apellidos: </label> <input type="text" id="apellidos" name="apellidos"><br>
		<input type="submit" value="Enviar">
	</form>

</body>
</html>
